<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5;
            display: flex; 
            justify-content: center; 
            padding-top: 80px; 
        }
        .box { 
            border: none; 
            padding: 30px; 
            border-radius: 15px; 
            width: 400px; 
            background-color: white; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #0b5ed7; }
        .error { color: #dc3545; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    
<div class="box">
   <div class="d-flex align-items-center mb-4">
        <i class="bi bi-person-fill-lock me-3 text-primary" style="font-size: 3.5rem;"></i>
        <h2 class="mb-0 fw-bold" style="font-size: 1.75rem;">Autentificare AD</h2>
    </div>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p class="success">{{ success }}</p>
    {% endif %}

    <p>Introduceți datele de acces</p>
    <form method="POST">
        <label>Utilizator AD:</label>
        <input type="text" name="username" placeholder="ex: student" required>

        <label>Parolă:</label>
        <input type="password" name="password" placeholder="Parola ta" required>

        <button type="submit">Conectare</button>
    </form>
</div>

</body>
</html>
