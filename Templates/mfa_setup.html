<!DOCTYPE html>
<html>
    <head>
        <title>Configurare MFA</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <div class="card mx-auto shadow" style="max-width: 400px;">
                <div class="card-body text-center">
                    <p>Scanează codul QR de mai jos cu <i>Google Authenticator</i></p>
                    
                    <img src="data:image/png;base64,{{ qr_code }}" class="img-fluid mb-3 border">

                    <form method="POST">
                        <input type="text" name="code" class="form-control mb-3" placeholder="Introdu cele 6 cifre" required>
                        <button type="submit" class="btn btn-primary w-100">Verifică</button>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
