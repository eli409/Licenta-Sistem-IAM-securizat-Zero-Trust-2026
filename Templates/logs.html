<!DOCTYPE html>
<html>
<head>
    <title>Jurnale de Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary fw-bold">
                <i class="bi bi-list-columns-reverse me-2"></i>Jurnale de Audit
            </h2>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-sm">Înapoi la Dashboard</a>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>Ora și detaliile evenimentului</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for log in logs %}
                            <tr>
                                <td class="font-monospace small">{{ log }}</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <p class="text-muted mt-3 small">Aceste loguri sunt salvate permanent în <code>audit_log.txt</code> pe serverul Ubuntu.</p>
    </div>
</body>
</html>
